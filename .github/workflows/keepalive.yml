name: keepalive

# GitHub auto-disables scheduled workflows after 60 days of repo inactivity.
# This makes a tiny empty commit weekly so the schedule never pauses — keeping
# the email agent always-on with no manual intervention.
# Schedule DISABLED (2026-07-13) — no scheduled workflows remain (all email
# schedules turned off), so there is nothing to keep alive. Re-enable this if
# any workflow schedule comes back.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "dealflow-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: keep scheduled workflows active"
          git push
