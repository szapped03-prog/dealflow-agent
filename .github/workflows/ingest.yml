name: DealFlow email ingest

# Runs the agent in the cloud on a schedule (no local machine needed).
on:
  # Runs on GitHub's infrastructure every 5 min (free on this public repo), and
  # ALWAYS on the latest committed code — no deploy pipeline to break. Each run
  # bursts a few checks so effective latency is ~60s. This replaces Railway.
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# If a run is still going when the next fires, don't pile up.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Ingest burst (~4 checks over ~4 min)
        run: |
          for i in 1 2 3 4; do
            echo "::group::ingest pass $i"
            node ingest.mjs || true
            echo "::endgroup::"
            if [ "$i" -lt 4 ]; then sleep 55; fi
          done
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          INVOICE_GMAIL_USER: ${{ secrets.INVOICE_GMAIL_USER }}
          INVOICE_GMAIL_APP_PASSWORD: ${{ secrets.INVOICE_GMAIL_APP_PASSWORD }}
          SMS_TO: ${{ secrets.SMS_TO }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GMAIL_MAILBOX: INBOX
          LOOKBACK_DAYS: '30'
