name: DealFlow heartbeat watchdog

# Runs independently of Railway so it can detect the agent being dead.
# Checks the heartbeat the agent writes to Supabase and emails if it's stale.
on:
  schedule:
    - cron: '*/15 * * * *' # every ~15 min (GitHub may batch this; detection lags at worst ~1h)
  workflow_dispatch: {}

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: node check.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          HEARTBEAT_THRESHOLD_MIN: '15'
