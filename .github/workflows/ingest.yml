name: DealFlow email ingest

# Runs the agent in the cloud on a schedule (no local machine needed).
on:
  schedule:
    - cron: '0 * * * *' # hourly, on the hour (UTC)
  workflow_dispatch: {} # lets us trigger a run by hand from the Actions tab

# If a run is still going when the next fires, don't pile up.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node ingest.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_MAILBOX: INBOX
          LOOKBACK_DAYS: '30'
