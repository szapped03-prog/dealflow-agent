name: DealFlow status (manual)

# Emails a status pulse (agent health, inbox backlog, last-hour activity).
# Schedule DISABLED — routine email is the daily summary (digest.yml) only;
# kept as a manual on-demand check.
on:
  workflow_dispatch: {}

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: node status.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          INVOICE_GMAIL_USER: ${{ secrets.INVOICE_GMAIL_USER }}
          INVOICE_GMAIL_APP_PASSWORD: ${{ secrets.INVOICE_GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
